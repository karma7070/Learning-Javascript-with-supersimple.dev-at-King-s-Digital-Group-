// converts the string to a number or actual math e.g after clicking 1; caln = '1' | after clicking +; caln = '1+' | after clicking 2; caln = '1+2' | after clicking =; the eval() function converts the currently stored string into numbers and mathematical operations or just math and computes the equation and stores the result in caln and then result is displayed in console

      return caln; // you don't have to pass the string to a variable u can just return it and it just stores
