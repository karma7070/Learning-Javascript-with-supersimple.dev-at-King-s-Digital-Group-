// Auto-Boxing: JS automatically wraps a string in an object allowing the strings to also have properties and methods which it provides

//An object is actually a reference, I think it holds the address of the data stored

const object1 = {
  msg: 'Hello'
};

const object2 = object1; //this simply stores the reference or address of object1 into object2 allowing to access the data in object1 instead of replicating the enitire object which would waste memory

object1.msg = 'Good Job'; // const doesn't allow u to modify the reference stored in the variable object1, but allows u to modify the elemments in the object


console.log(object1); 
console.log(object2); 

const object3 = {
  msg: 'Good Job'
};

console.log(object1===object3);//false obvi because they contain different refs

const { msg } = object1; // destructuring an object where the element in the object has the same name as the variable so it's value can be passed like this. A new variable 'msg' is initialized with the value stored in object1's msg element

console.log(msg);

const object4 = {
  msg: msg //variables can be stored in objects like this
}

object4.price = 78;

console.log(object4)

const object5 = {
 msg, // variables can be stored in objects like this
 method: function function1(){
  console.log('method');
 }
}

console.log(object5)

console.log(object5['method']())//display the function like this bcs method takes the function so it has to be called like a function

//Short-hand method

const object6 = {
 msg, 
 method(){
  console.log('method');
 }

 //instead of writing the function like we did in object5, this is a shorter method
}

console.log(object6)
