<!DOCTYPE html>
  <html>
    <head>
      <link rel="stylesheet" href="test1.css">
    </head>

    <body>


      <script>

        let variable1 = 3;
        console.log(variable1);

        let calculation = 2 + 2;
        console.log(calculation+7);

        variable1 = 6;
        console.log(variable1);

        //3 ways to create variables in jS

        //1. let: value can be changed

        //2. const: value stays constant and cannot be changed (use const by default unless you know the value will change)

        //3. var (not recommended)

        // we can use typeof with variables to identify their data types e.g

        console.log(typeof variable1);

        const name= "Arthur";

        console.log(`My name is ${name}`);

        const cof = 5;
        const bgl = 3;
        const soup = 9;

        const cost = cof + (2*bgl) + soup;

        console.log(`Cost of food: $${cost}`);
        
        const tax = (cost*10)/100;

        console.log(`Your tax is: $${tax}`);

      </script>
    </body>

  </html>
