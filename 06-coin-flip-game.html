<body>
  
  <button>
    Heads
  </button>

  <button>
    Tails
  </button>

  <script>
    const flip = Math.random();
    let result = ''; 
    const guess = 'Tails';

    if(flip >= 0 && flip  < 1/2){
      result = 'Heads';

    } else if(flip >= 1/2 && flip <1){
      result = 'Tails';

    }

    const display = guess === result ? "You win!" : "You lose!";

    console.log(display);

  </script>
